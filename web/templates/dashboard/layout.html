{% extends "base.html" %}

{% block content %}
<div class="flex min-h-[calc(100vh-8rem)]">
    <!-- Sidebar -->
    <aside class="w-64 bg-discord-darker border-r border-gray-700/50 p-4 hidden md:block">
        <div class="flex items-center space-x-3 mb-6 pb-4 border-b border-gray-700/50">
            <img src="{{ guild.icon_url }}" alt="" class="w-10 h-10 rounded-full">
            <div class="min-w-0">
                <div class="text-sm font-semibold truncate">{{ guild.name }}</div>
                <div class="text-xs text-gray-500">{{ guild.member_count | format_number }} members</div>
            </div>
        </div>
        <nav class="space-y-1">
            <a href="/dashboard/{{ guild.id }}"
               class="block px-3 py-2 rounded-md text-sm {% if active_page == 'overview' %}bg-discord-blurple text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-700/50{% endif %} transition">
                Overview
            </a>
            <a href="/dashboard/{{ guild.id }}/mod"
               class="block px-3 py-2 rounded-md text-sm {% if active_page == 'mod' %}bg-discord-blurple text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-700/50{% endif %} transition">
                Moderation
            </a>
            <a href="/dashboard/{{ guild.id }}/tickets"
               class="block px-3 py-2 rounded-md text-sm {% if active_page == 'tickets' %}bg-discord-blurple text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-700/50{% endif %} transition">
                Tickets
            </a>
            <a href="/dashboard/{{ guild.id }}/tags"
               class="block px-3 py-2 rounded-md text-sm {% if active_page == 'tags' %}bg-discord-blurple text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-700/50{% endif %} transition">
                Tags
            </a>
            <a href="/dashboard/{{ guild.id }}/starboard"
               class="block px-3 py-2 rounded-md text-sm {% if active_page == 'starboard' %}bg-discord-blurple text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-700/50{% endif %} transition">
                Starboard
            </a>
            <a href="/dashboard/{{ guild.id }}/stats"
               class="block px-3 py-2 rounded-md text-sm {% if active_page == 'stats' %}bg-discord-blurple text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-700/50{% endif %} transition">
                Stats
            </a>
            <a href="/dashboard/{{ guild.id }}/levels"
               class="block px-3 py-2 rounded-md text-sm {% if active_page == 'levels' %}bg-discord-blurple text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-700/50{% endif %} transition">
                Levels
            </a>
            <a href="/dashboard/{{ guild.id }}/leaderboard"
               class="block px-3 py-2 rounded-md text-sm {% if active_page == 'leaderboard' %}bg-discord-blurple text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-700/50{% endif %} transition">
                Leaderboard
            </a>
        </nav>
        <div class="mt-6 pt-4 border-t border-gray-700/50">
            <a href="/dashboard" class="block px-3 py-2 rounded-md text-sm text-gray-500 hover:text-white hover:bg-gray-700/50 transition">
                &larr; All Servers
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 p-6 lg:p-8 overflow-auto">
        {% block dashboard_content %}{% endblock %}
    </div>
</div>
{% endblock %}
