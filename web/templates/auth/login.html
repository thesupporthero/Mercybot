{% extends "base.html" %}

{% block title %}Login - {{ bot_name }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-24 text-center">
    <h1 class="text-3xl font-bold mb-4">Login Required</h1>
    <p class="text-gray-400 mb-8">Sign in with your Discord account to access the dashboard.</p>
    <a href="/auth/login" class="inline-block px-6 py-3 rounded-lg font-medium bg-discord-blurple text-white hover:bg-indigo-500 transition">
        Login with Discord
    </a>
</div>
{% endblock %}
