<!DOCTYPE html>
<html lang="en" class="dark" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ bot_name }}{% endblock %}</title>

    <!-- Theme CSS variables — must be before Tailwind so the vars exist when it generates styles -->
    <style>
        /* Dark (default) */
        :root {
            --discord-darkest: #0f0f23;
            --discord-darker:  #16213e;
            --discord-dark:    #1a1a2e;
        }
        /* Light — applied when .dark class is removed from <html> */
        html:not(.dark) {
            --discord-darkest: #f0f2f5;
            --discord-darker:  #ffffff;
            --discord-dark:    #e4e6ea;
        }
        /* Text & border overrides for light mode */
        html:not(.dark) body           { color: #111827; }
        html:not(.dark) .text-white    { color: #111827 !important; }
        html:not(.dark) .text-gray-100 { color: #111827 !important; }
        html:not(.dark) .text-gray-300 { color: #374151 !important; }
        html:not(.dark) .text-gray-400 { color: #4b5563 !important; }
        html:not(.dark) .text-gray-500 { color: #6b7280 !important; }
        html:not(.dark) .border-gray-700\/50 { border-color: rgba(0,0,0,0.12) !important; }
        html:not(.dark) .bg-gray-700   { background-color: #e5e7eb !important; color: #374151 !important; }
        html:not(.dark) .hover\:bg-gray-700\/50:hover { background-color: rgba(0,0,0,0.06) !important; }
        html:not(.dark) input, html:not(.dark) select, html:not(.dark) textarea {
            background-color: #f9fafb !important;
            color: #111827 !important;
            border-color: #d1d5db !important;
        }
    </style>

    <!-- Apply saved theme before first paint (no flash) -->
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        discord: {
                            blurple:  '#5865F2',
                            green:    '#57F287',
                            yellow:   '#FEE75C',
                            fuchsia:  '#EB459E',
                            red:      '#ED4245',
                            dark:    'var(--discord-dark)',
                            darker:  'var(--discord-darker)',
                            darkest: 'var(--discord-darkest)',
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body class="bg-discord-darkest text-gray-100 min-h-screen flex flex-col">
    <nav class="bg-discord-darker border-b border-gray-700/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-xl font-bold text-white hover:text-discord-blurple transition">
                        {{ bot_name }}
                    </a>
                    <div class="hidden sm:flex space-x-2">
                        <a href="/" class="px-3 py-2 rounded-md text-sm text-gray-300 hover:text-white hover:bg-gray-700/50 transition">Home</a>
                        {% if user %}
                        <a href="/dashboard" class="px-3 py-2 rounded-md text-sm text-gray-300 hover:text-white hover:bg-gray-700/50 transition">Dashboard</a>
                        {% endif %}
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode"
                        class="w-8 h-8 flex items-center justify-center rounded-md text-gray-400 hover:text-white hover:bg-gray-700/50 transition text-lg">
                        <span id="theme-icon"></span>
                    </button>
                    {% if user %}
                    <div class="flex items-center space-x-2">
                        <img src="{{ user.avatar_url }}" alt="" class="w-8 h-8 rounded-full">
                        <span class="text-sm text-gray-300">{{ user.username }}</span>
                    </div>
                    <a href="/auth/logout" class="px-3 py-1.5 rounded-md text-sm bg-gray-700 text-gray-300 hover:bg-gray-600 transition">Logout</a>
                    {% else %}
                    <a href="/auth/login" class="px-4 py-2 rounded-md text-sm font-medium bg-discord-blurple text-white hover:bg-indigo-500 transition">
                        Login with Discord
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-discord-darker border-t border-gray-700/50 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
            {{ bot_name }} &mdash; A Discord bot by The Support Hero
        </div>
    </footer>

    <script src="/static/js/dashboard.js"></script>
    <script>
        function updateThemeIcon() {
            var icon = document.getElementById('theme-icon');
            if (icon) icon.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
        }

        function toggleTheme() {
            var isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        updateThemeIcon();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
