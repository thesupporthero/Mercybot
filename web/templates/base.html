<!DOCTYPE html>
<html lang="en" class="dark" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ bot_name }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        discord: {
                            blurple: '#5865F2',
                            green: '#57F287',
                            yellow: '#FEE75C',
                            fuchsia: '#EB459E',
                            red: '#ED4245',
                            dark: '#1a1a2e',
                            darker: '#16213e',
                            darkest: '#0f0f23',
                        }
                    }
                }
            }
        }
    </script>
    <script>
        // Run before first paint to prevent flash
        var __LIGHT_CSS = [
            'body { background-color: #f0f2f5 !important; color: #111827 !important; }',
            '.bg-discord-darkest { background-color: #f0f2f5 !important; }',
            '.bg-discord-darker  { background-color: #ffffff !important; }',
            '.bg-discord-dark    { background-color: #e4e6ea !important; }',
            '.text-gray-100 { color: #111827 !important; }',
            '.text-gray-300 { color: #374151 !important; }',
            '.text-gray-400 { color: #4b5563 !important; }',
            '.text-gray-500 { color: #6b7280 !important; }',
            '.text-white    { color: #111827 !important; }',
            '.bg-gray-700   { background-color: #e5e7eb !important; color: #374151 !important; }',
            '.hover\\:bg-gray-700\\/50:hover { background-color: rgba(0,0,0,0.06) !important; }',
            '.border-gray-700\\/50 { border-color: rgba(0,0,0,0.12) !important; }',
            'input, select, textarea { background-color: #f9fafb !important; color: #111827 !important; border-color: #d1d5db !important; }',
        ].join('\n');

        (function () {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.remove('dark');
                var s = document.createElement('style');
                s.id = 'light-theme';
                s.textContent = __LIGHT_CSS;
                document.head.appendChild(s);
            }
        })();
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body class="bg-discord-darkest text-gray-100 min-h-screen flex flex-col">
    <nav class="bg-discord-darker border-b border-gray-700/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-xl font-bold text-white hover:text-discord-blurple transition">
                        {{ bot_name }}
                    </a>
                    <div class="hidden sm:flex space-x-2">
                        <a href="/" class="px-3 py-2 rounded-md text-sm text-gray-300 hover:text-white hover:bg-gray-700/50 transition">Home</a>
                        {% if user %}
                        <a href="/dashboard" class="px-3 py-2 rounded-md text-sm text-gray-300 hover:text-white hover:bg-gray-700/50 transition">Dashboard</a>
                        {% endif %}
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <!-- Light/Dark toggle -->
                    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode"
                        class="w-8 h-8 flex items-center justify-center rounded-md text-gray-400 hover:text-white hover:bg-gray-700/50 transition text-lg">
                        <span id="theme-icon"></span>
                    </button>
                    {% if user %}
                    <div class="flex items-center space-x-2">
                        <img src="{{ user.avatar_url }}" alt="" class="w-8 h-8 rounded-full">
                        <span class="text-sm text-gray-300">{{ user.username }}</span>
                    </div>
                    <a href="/auth/logout" class="px-3 py-1.5 rounded-md text-sm bg-gray-700 text-gray-300 hover:bg-gray-600 transition">Logout</a>
                    {% else %}
                    <a href="/auth/login" class="px-4 py-2 rounded-md text-sm font-medium bg-discord-blurple text-white hover:bg-indigo-500 transition">
                        Login with Discord
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-discord-darker border-t border-gray-700/50 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
            {{ bot_name }} &mdash; A Discord bot by The Support Hero
        </div>
    </footer>

    <script src="/static/js/dashboard.js"></script>
    <script>
        function updateThemeIcon() {
            var isDark = document.documentElement.classList.contains('dark');
            var icon = document.getElementById('theme-icon');
            if (icon) icon.textContent = isDark ? '☀️' : '🌙';
        }

        function toggleTheme() {
            var html = document.documentElement;
            var isNowDark = html.classList.toggle('dark');
            var sheet = document.getElementById('light-theme');

            if (!isNowDark) {
                // Switched to light — inject overrides
                if (!sheet) {
                    sheet = document.createElement('style');
                    sheet.id = 'light-theme';
                    sheet.textContent = __LIGHT_CSS;
                    document.head.appendChild(sheet);
                }
                localStorage.setItem('theme', 'light');
            } else {
                // Switched to dark — remove overrides
                if (sheet) sheet.remove();
                localStorage.setItem('theme', 'dark');
            }
            updateThemeIcon();
        }

        // Set icon on page load
        updateThemeIcon();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
